# Deploy disparando el WEBHOOK de Coolify por HTTPS (puerto 443).
#
# Por qué: el deploy por SSH (deploy.yml) falla cuando fail2ban del VPS banea
# las IPs efímeras de los runners de GitHub en el puerto 22 (incidentes
# 2026-06-04 y 2026-06-09). El webhook de deploy de Coolify v3 se dispara por
# HTTPS → el ban del 22 deja de afectar. Coolify reconstruye y recrea la app
# con su propio pipeline (lo mismo que el botón "Deploy" del panel).
#
# ─── ESTADO: INACTIVO POR DEFECTO (workflow_dispatch) ────────────────────
# Para no chocar con deploy.yml hasta validarlo. CUTOVER cuando un disparo
# manual deje la web actualizada:
#   1. Descomenta el bloque `push:` de abajo.
#   2. En deploy.yml, quita su trigger `push:` (deja solo workflow_dispatch) o
#      bórralo.
#
# REQUISITO (lo crea Mario, es una credencial): secret de repo
#   COOLIFY_DEPLOY_WEBHOOK = la URL completa del "Deploy webhook" que muestra
#   Coolify en: panel → app startidea-web → pestaña Webhooks.

name: deploy-coolify

on:
  workflow_dispatch:
  # ─── CUTOVER: descomenta y desactiva el push de deploy.yml ───
  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - "docs/**"
  #     - "reports/**"
  #     - "infra/**"
  #     - "README.md"
  #     - ".gitignore"
  #     - ".github/workflows/**"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Coolify deploy (HTTPS)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Disparar webhook de Coolify
        env:
          WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
        shell: bash {0}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "::error::Falta el secret COOLIFY_DEPLOY_WEBHOOK"; exit 1
          fi
          # El webhook de deploy de Coolify v3 se dispara por GET; algunas
          # versiones aceptan POST. Probamos GET y, si no da 2xx, POST.
          code=$(curl -sk -o /tmp/resp.txt -w "%{http_code}" --max-time 30 "$WEBHOOK" || echo "000")
          echo "GET -> HTTP $code"; cat /tmp/resp.txt 2>/dev/null | head -c 400; echo
          if [ "${code:0:1}" != "2" ]; then
            code=$(curl -sk -o /tmp/resp.txt -w "%{http_code}" --max-time 30 -X POST "$WEBHOOK" || echo "000")
            echo "POST -> HTTP $code"; cat /tmp/resp.txt 2>/dev/null | head -c 400; echo
          fi
          if [ "${code:0:1}" != "2" ]; then
            echo "::error::El webhook no devolvió 2xx (último: $code). Revisa la URL en Coolify."; exit 1
          fi
          echo "✓ Deploy encolado en Coolify (HTTP $code)"

      - name: Verificar que startidea.es responde tras el rebuild
        shell: bash {0}
        run: |
          # Coolify clona + build + recreate. Margen hasta ~10 min.
          # Ojo: esto solo confirma que el sitio responde 200, no la versión
          # exacta (Coolify reporta el estado real del build en su panel).
          for i in $(seq 1 60); do
            code=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 https://startidea.es/ 2>/dev/null || echo "000")
            [ "$code" = "200" ] && { echo "✓ startidea.es responde 200 (tras $((i*10))s)"; exit 0; }
            echo "esperando rebuild de Coolify... ($i/60, last=$code)"; sleep 10
          done
          echo "::warning::startidea.es no respondió 200 en ~10 min — revisa el build en el panel de Coolify"; exit 1
