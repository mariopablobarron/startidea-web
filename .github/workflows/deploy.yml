name: Deploy a producción (VPS Hostinger)

# Cada push a main dispara un deploy. La SSH key dedicada que vive en el
# secret `VPS_SSH_KEY` solo puede ejecutar /root/deploy-startidea-web.sh
# del VPS — está restringida con command="..." en authorized_keys.
# Coolify v3 sigue gestionando Traefik, certs y panel; este workflow
# solo controla qué imagen construye y arranca el container.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'reports/**'
      - 'README.md'
      - '.gitignore'
      - 'infra/**'   # docker-compose template y .env.example no afectan al build
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH + build + recreate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Disparar /root/deploy-startidea-web.sh en VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 72.61.195.108
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          # No envíamos comandos: la SSH key tiene command="..." forzado en
          # authorized_keys del VPS (ver /root/deploy-startidea-web.sh).
          # Cualquier conexión ejecuta SOLO ese script y termina. El runner
          # de GitHub Actions no puede ejecutar nada más, ni siquiera con la
          # privada filtrada (que no se transmite por SSH, solo se usa para
          # firmar el handshake). Por eso el fingerprint pinning es
          # redundante y conflicta con la librería Go de drone-ssh
          # (acepta solo un algoritmo, mientras el host expone 3).
          script: ":"
          command_timeout: 8m
