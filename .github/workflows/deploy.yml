name: Deploy a producción (VPS Hostinger)

# Cada push a main dispara un deploy. La SSH key dedicada que vive en el
# secret `VPS_SSH_KEY` solo puede ejecutar /root/deploy-startidea-web.sh
# del VPS — está restringida con command="..." en authorized_keys.
# Coolify v3 sigue gestionando Traefik, certs y panel; este workflow
# solo controla qué imagen construye y arranca el container.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'reports/**'
      - 'README.md'
      - '.gitignore'
      - 'infra/**'   # docker-compose template y .env.example no afectan al build
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH + build + recreate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Disparar /root/deploy-startidea-web.sh en VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 72.61.195.108
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          # Fingerprint anclado para evitar man-in-the-middle. Si cambia
          # el host key del VPS, este step fallará — eso es intencional.
          fingerprint: SHA256:QwSp+3TBiGKljDMdfvDXGIB2IqO7MNVG+azwqqKLeJ0
          # No envíamos comandos: la SSH key tiene command="..." forzado en
          # authorized_keys del VPS, así que cualquier conexión ejecuta el
          # script de deploy y nada más. El parámetro script aquí es
          # ignorado por el lado del VPS pero appleboy/ssh-action requiere
          # algo no vacío.
          script: ":"
          command_timeout: 8m
