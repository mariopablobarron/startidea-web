name: Daily refresh (rebuild SSG con datos frescos)

# Como startidea.es es SSG (`output: 'static'`), el feed RSS de Granada Social,
# las notas editoriales y cualquier fuente externa quedan "congeladas" en el
# momento del último build. Este cron dispara un rebuild diario para que:
#
#   - Bloque GranadaSocialFeed en home muestre las noticias frescas del día
#   - Sitemap.xml refleje nuevas notas si las hay
#   - JSON-LD y meta dates queden al día
#
# Hora: 05:30 UTC = 07:30 ES (invierno) / 06:30 ES (verano huso EU).
# Antes del horario de mayor tráfico humano (mañana) pero después del
# cron-de-cron de notas (si lo hay).

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  trigger-deploy:
    name: Disparar workflow de deploy
    runs-on: ubuntu-latest
    timeout-minutes: 2

    # Sin esto el GITHUB_TOKEN solo tiene permisos de LECTURA y disparar otro
    # workflow devuelve `HTTP 403: Resource not accessible by integration`.
    # Es lo que rompía el refresh diario en silencio: el cron se ejecutaba,
    # fallaba aquí, y la web no se regeneraba. Detectado el 2026-07-20 tras
    # 12 días seguidos de fallo sin que saltara ninguna alarma.
    permissions:
      actions: write
      contents: read

    steps:
      - name: Disparar deploy.yml
        run: |
          gh workflow run deploy.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}
        env:
          # Usa DEPLOY_DISPATCH_TOKEN (un PAT con scope actions:write) si está
          # definido; si no, el token automático. GitHub impide que un run
          # lanzado con GITHUB_TOKEN dispare otro workflow, para evitar
          # recursiones: si tras dar permisos el deploy sigue sin arrancar,
          # hay que crear ese PAT y guardarlo como secret del repo.
          GH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
